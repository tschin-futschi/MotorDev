<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect x="4" y="4" width="192" height="192" rx="28" fill="#0f1f0f" stroke="#639922" stroke-width="2"/>

  <!-- 红色阶跃指令信号 -->
